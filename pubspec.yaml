name: gallery
description: A beautiful iOS-like photo gallery app for Android built with Flutter.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  photo_manager: ^3.0.0
  provider: ^6.1.1
  intl: ^0.19.0
  cached_network_image: ^3.3.1
  photo_view: ^0.15.0
  flutter_staggered_grid_view: ^0.7.0
  share_plus: ^7.2.1
  path_provider: ^2.1.1
  permission_handler: ^11.1.0
  shimmer: ^3.0.0
  cupertino_icons: ^1.0.6
  lottie: ^3.0.0
  flutter_animate: ^4.3.0
  video_player: ^2.8.3
  photo_manager_image_provider: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icon.png"
  
